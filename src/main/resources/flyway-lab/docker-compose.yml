
services:

  postgres:
    image: postgres
    container_name: perf_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1111
      POSTGRES_DB: postgres
    ports:
      - "5437:5432"

  flyway:
    image: flyway/flyway:10
    depends_on:
      - postgres
    command: -connectRetries=10 migrate
    volumes:
      - ./sql:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5437/postgres
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: 1111